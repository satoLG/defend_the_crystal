name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # the frontend must build (Vite) …
      - run: npm run build
      # … and the authoritative simulation must run headless on Node
      - run: node apps/server/scripts/sim-smoke.mjs
