# Render Blueprint — authoritative multiplayer server(s).
#
# Deploys apps/server as a Node web service. The frontend lives on Vercel
# (see vercel.json) and talks to this over Socket.IO.
#
# Setup: Render Dashboard -> New -> Blueprint -> pick this repo (branch main).
#
# NOTE on PR previews: Render's automatic per-PR "Preview Environments"
#   previews:
#     generation: automatic
# require a PAID workspace — they are NOT available on the free/Hobby plan.
# Instead, this file ships TWO long-lived services: production (tracks
# `main`) and staging (tracks a `staging` branch), which is the free-tier
# substitute for per-PR previews — see README "Previews" for the workflow
# (merge into `staging` to deploy front+server together, then promote
# `staging` -> `main` once validated).
#
# `dtc-server-staging` requires the branch to exist first:
#   git push origin main:staging

services:
  # ---- Production: tracks the default branch (main) ----
  - type: web
    name: dtc-server
    runtime: node
    plan: free
    rootDir: .
    # install the whole workspace so @dtc/shared resolves for the server
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Optional: exact extra browser origins allowed to connect, comma-
      # separated. localhost and every *.vercel.app deploy are already allowed
      # by the server, so this is only needed for a custom domain.
      - key: CLIENT_ORIGINS
        sync: false

  # ---- Staging: tracks the `staging` branch ----
  # A stable, shared non-prod server — the free-tier answer to per-PR preview
  # servers. Merge a feature branch into `staging` (instead of `main`) and
  # this redeploys automatically, alongside Vercel's automatic deployment of
  # the same `staging` branch, so one merge updates front+server together.
  - type: web
    name: dtc-server-staging
    runtime: node
    plan: free
    branch: staging
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CLIENT_ORIGINS
        sync: false
